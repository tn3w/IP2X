name: Update IP Databases

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Create data directory
        run: mkdir -p data

      - name: Download IP2Location databases
        env:
          IP2LOCATION_TOKEN: ${{ secrets.IP2LOCATION_TOKEN }}
        run: |
          set -euo pipefail
          for DB in DB5LITECSV DB5LITECSVIPV6 DBASNLITE DBASNLITEIPV6 PX12LITECSV PX12LITECSVIPV6; do
            echo "Downloading ${DB}..."
            curl --fail -L -o temp.zip "https://www.ip2location.com/download/?file=${DB}&token=${IP2LOCATION_TOKEN}"
            unzip -j temp.zip "*.CSV" -d data/
            rm temp.zip
          done

      - name: Download GeoLite2 database
          curl -fL -o data/GeoLite2-City.mmdb "https://github.com/P3TERX/GeoLite.mmdb/releases/latest/download/GeoLite2-City.mmdb" || { echo "Error: Failed to download GeoLite2-City.mmdb"; exit 1; }
          if [ ! -s data/GeoLite2-City.mmdb ]; then echo "Error: GeoLite2-City.mmdb file is missing or empty after download"; exit 1; fi
          curl -L -o data/GeoLite2-City.mmdb "https://github.com/P3TERX/GeoLite.mmdb/releases/latest/download/GeoLite2-City.mmdb"


      - name: Verify binary databases
        run: |
          missing=0
          for f in geo.bin proxy_types.bin asn.bin isp.bin; do
            if [ ! -f "$f" ]; then
              echo "Expected output file not found: $f"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more required binary database files are missing. Aborting release creation."
            exit 1
          fi
        run: cargo run --release

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          TAG_NAME="v$(date -u +%Y%m%d-%H%M%S)"

          gh release create "$TAG_NAME" \
            geo.bin \
            proxy_types.bin \
            asn.bin \
            isp.bin \
            --title "IP Database Update - $TIMESTAMP" \
            --notes "Automated IP geolocation and proxy database update.

          **Files:**
          - \`geo.bin\` - IP geolocation data (latitude/longitude)
          - \`proxy_types.bin\` - Proxy type detection data
          - \`asn.bin\` - Autonomous System Number data
          TAGS=($(echo "$RELEASES_JSON" | jq -r 'sort_by(.createdAt) | reverse | .[].tagName'))

          **Download:**
          \`\`\`bash
          curl -L -O https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/geo.bin
          curl -L -O https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/proxy_types.bin
          curl -L -O https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/asn.bin
          curl -L -O https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/isp.bin
          \`\`\`"

      - name: Cleanup old releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASES_JSON=$(gh release list --limit 100 --json tagName,createdAt)
          TAGS=($(echo "$RELEASES_JSON" | jq -r 'sort_by(.createdAt) | .[].tagName'))
          TOTAL=${#TAGS[@]}
          KEEP=3

          if [ "$TOTAL" -le "$KEEP" ]; then
            echo "No releases to delete (total $TOTAL, keeping $KEEP)."
            exit 0
          fi

          DELETE_COUNT=$((TOTAL - KEEP))
          echo "Deleting $DELETE_COUNT old release(s), keeping $KEEP newest."

          for i in $(seq 0 $((DELETE_COUNT - 1))); do
            TAG=${TAGS[$i]}
            echo "Deleting old release: $TAG"
            gh release delete "$TAG" --yes 2>/dev/null || true
            git push --delete origin "$TAG" 2>/dev/null || true
          done
